<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sorrowfeng</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 60px 20px 80px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #080818;
      overflow-x: hidden;
    }

    /* ── Aurora background ── */
    .aurora {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: radial-gradient(ellipse 120% 80% at 20% 20%, #1e0a4a 0%, transparent 60%),
                  radial-gradient(ellipse 100% 70% at 80% 80%, #0a1a4a 0%, transparent 60%),
                  #080818;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      animation: drift 10s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }
    .b1 { width: 700px; height: 700px; top: -20%; left: -15%;
          background: radial-gradient(circle, rgba(124,58,237,.55), transparent 65%);
          animation-delay: 0s; }
    .b2 { width: 550px; height: 550px; bottom: -20%; right: -10%;
          background: radial-gradient(circle, rgba(37,99,235,.55), transparent 65%);
          animation-delay: -4s; }
    .b3 { width: 450px; height: 450px; top: 40%; left: 55%;
          background: radial-gradient(circle, rgba(219,39,119,.45), transparent 65%);
          animation-delay: -7s; }
    .b4 { width: 350px; height: 350px; top: 10%; right: 20%;
          background: radial-gradient(circle, rgba(16,185,129,.3), transparent 65%);
          animation-delay: -2s; }
    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(35px,-40px) scale(1.07); }
      66%      { transform: translate(-25px,30px) scale(0.93); }
    }

    /* ── Star canvas ── */
    #stars { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── Shooting stars ── */
    .shoot { position: fixed; z-index: 2; pointer-events: none; }
    .shoot span {
      position: absolute;
      display: block;
      width: 2px; height: 2px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 6px 2px rgba(255,255,255,.6);
      animation: shoot 3s linear infinite;
      opacity: 0;
    }
    .shoot span::after {
      content: '';
      position: absolute;
      top: 0; right: 2px;
      width: 80px; height: 1px;
      background: linear-gradient(to left, rgba(255,255,255,.6), transparent);
    }
    @keyframes shoot {
      0%   { transform: translate(0,0); opacity: 1; }
      70%  { opacity: 1; }
      100% { transform: translate(250px,120px); opacity: 0; }
    }

    /* ── Profile card ── */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(28px) saturate(180%);
      -webkit-backdrop-filter: blur(28px) saturate(180%);
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 28px;
      padding: 52px 60px 44px;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,255,255,.04) inset,
        0 32px 64px rgba(0,0,0,.5),
        0 0 120px rgba(124,58,237,.12);
      animation: rise .9s cubic-bezier(.16,1,.3,1) both;
      width: min(420px, 100%);
    }
    .card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 29px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,.6), rgba(37,99,235,.4), rgba(219,39,119,.4), rgba(124,58,237,.6));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      background-size: 300% 300%;
      animation: borderShimmer 4s linear infinite;
      pointer-events: none;
    }
    @keyframes borderShimmer {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(50px) scale(.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Avatar ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 28px;
    }
    .avatar-ring {
      position: absolute;
      inset: -5px;
      border-radius: 50%;
      background: conic-gradient(#7c3aed, #2563eb, #db2777, #10b981, #7c3aed);
      animation: spin 3s linear infinite;
      z-index: 0;
    }
    .avatar-ring-inner {
      position: absolute;
      inset: -1px;
      border-radius: 50%;
      background: #080818;
      z-index: 1;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .avatar {
      position: relative;
      width: 104px; height: 104px;
      border-radius: 50%;
      z-index: 2;
      display: block;
      object-fit: cover;
      border: 3px solid #080818;
    }
    .avatar-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,.35), transparent 70%);
      animation: glowPulse 2.5s ease-in-out infinite;
      z-index: 0;
    }
    @keyframes glowPulse {
      0%,100% { opacity: .6; transform: scale(1); }
      50%      { opacity: 1;  transform: scale(1.1); }
    }

    /* ── Name ── */
    .name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #e2d9f3, #a78bfa, #93c5fd, #f9a8d4);
      background-size: 200% 200%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: gradShift 5s ease infinite, fadeUp .8s .25s both;
      margin-bottom: 8px;
    }
    @keyframes gradShift {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── Tagline ── */
    .tagline {
      font-size: .95rem;
      color: rgba(255,255,255,.45);
      margin-bottom: 20px;
      animation: fadeUp .8s .4s both;
      min-height: 1.4em;
    }
    .cursor {
      display: inline-block;
      width: 2px; height: .9em;
      background: rgba(167,139,250,.8);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink .8s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── Status ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .8rem;
      color: rgba(255,255,255,.35);
      margin-bottom: 32px;
      animation: fadeUp .8s .55s both;
    }
    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 8px #4ade80, 0 0 16px rgba(74,222,128,.4);
      animation: dotPulse 2s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { box-shadow: 0 0 8px #4ade80, 0 0 16px rgba(74,222,128,.4); }
      50%      { box-shadow: 0 0 16px #4ade80, 0 0 32px rgba(74,222,128,.6); }
    }

    /* ── Links ── */
    .links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp .8s .7s both;
    }
    .link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 11px 22px;
      border-radius: 14px;
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.75);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      position: relative;
      overflow: hidden;
    }
    .link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(37,99,235,.15));
      opacity: 0;
      transition: opacity .22s;
    }
    .link:hover { border-color: rgba(167,139,250,.4); color: #fff;
                  transform: translateY(-3px);
                  box-shadow: 0 8px 24px rgba(0,0,0,.35), 0 0 20px rgba(124,58,237,.2); }
    .link:hover::before { opacity: 1; }
    .link svg { flex-shrink: 0; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Projects section ── */
    .section {
      position: relative;
      z-index: 10;
      width: min(760px, 100%);
      margin-top: 40px;
      animation: fadeUp .8s 1s both;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding: 0 4px;
    }
    .section-title {
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
    }
    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(255,255,255,.1), transparent);
    }

    /* ── Project cards grid ── */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
    }

    .proj-card {
      position: relative;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 20px;
      padding: 22px 22px 18px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all .25s cubic-bezier(.4,0,.2,1);
      overflow: hidden;
      cursor: pointer;
    }
    .proj-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,.08), rgba(219,39,119,.06));
      opacity: 0;
      transition: opacity .25s;
    }
    .proj-card::after {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 21px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(124,58,237,.5), rgba(37,99,235,.3), rgba(219,39,119,.4));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude;
      opacity: 0;
      transition: opacity .25s;
      pointer-events: none;
    }
    .proj-card:hover { transform: translateY(-5px);
                       box-shadow: 0 16px 40px rgba(0,0,0,.45), 0 0 30px rgba(124,58,237,.15); }
    .proj-card:hover::before { opacity: 1; }
    .proj-card:hover::after  { opacity: 1; }

    .proj-icon {
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(219,39,119,.4));
    }
    .proj-meta {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }
    .proj-name {
      font-size: .98rem;
      font-weight: 700;
      color: rgba(255,255,255,.9);
      letter-spacing: -.01em;
    }
    .proj-badge {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .06em;
      padding: 2px 8px;
      border-radius: 20px;
      background: rgba(124,58,237,.25);
      border: 1px solid rgba(124,58,237,.4);
      color: rgba(167,139,250,.9);
    }
    .proj-badge.green {
      background: rgba(16,185,129,.2);
      border-color: rgba(16,185,129,.35);
      color: rgba(52,211,153,.9);
    }
    .proj-desc {
      font-size: .82rem;
      line-height: 1.6;
      color: rgba(255,255,255,.38);
      flex: 1;
    }
    .proj-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .proj-arrow {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: .78rem;
      color: rgba(167,139,250,.55);
      font-weight: 500;
      transition: gap .2s, color .2s;
    }
    .proj-card:hover .proj-arrow {
      gap: 9px;
      color: rgba(167,139,250,.9);
    }
    .proj-gh {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px; height: 28px;
      border-radius: 8px;
      color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.1);
      text-decoration: none;
      transition: all .2s;
    }
    .proj-gh:hover {
      color: #fff;
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.22);
      transform: translateY(-2px);
    }
    .proj-badge { text-decoration: none; }
    .proj-badge.green:hover { opacity: .75; }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>
  <div class="blob b4"></div>
  <canvas id="stars"></canvas>

  <div class="shoot" style="top:15%;left:10%"><span style="animation-delay:0s"></span></div>
  <div class="shoot" style="top:35%;left:60%"><span style="animation-delay:-1.5s"></span></div>
  <div class="shoot" style="top:5%;left:75%"><span style="animation-delay:-2.8s"></span></div>

  <!-- Profile card -->
  <div class="card" id="profile-card">
    <div class="avatar-wrap">
      <div class="avatar-glow"></div>
      <div class="avatar-ring"></div>
      <div class="avatar-ring-inner"></div>
      <img class="avatar"
           src="https://github.com/sorrowfeng.png"
           alt="sorrowfeng"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;position:relative;z-index:2;width:104px;height:104px;border-radius:50%;border:3px solid #080818;background:linear-gradient(135deg,#7c3aed,#2563eb);align-items:center;justify-content:center;font-size:2.2rem;font-weight:800;color:#fff;">S</div>
    </div>

    <div class="name">sorrowfeng</div>

    <div class="tagline">
      <span id="typed"></span><span class="cursor"></span>
    </div>

    <div class="status">
      <span class="dot"></span>
      Building something new
    </div>

    <div class="links">
      <a class="link" href="https://github.com/sorrowfeng" target="_blank" rel="noopener">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
        GitHub
      </a>
    </div>
  </div>

  <!-- Projects section -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Projects</span>
      <div class="section-line"></div>
    </div>

    <div class="projects">
      <a class="proj-card" href="https://www.sorrowfeng.top/mahjong-go/" target="_blank" rel="noopener">
        <div class="proj-icon">🀄</div>
        <div class="proj-meta">
          <span class="proj-name">麻将消消乐</span>
          <a class="proj-badge green" href="https://github.com/sorrowfeng/mahjong-go" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open Source</a>
        </div>
        <div class="proj-desc">复刻经典麻将趣味消除，支持拖拽滑牌、连锁消除、撤销与智能提示，全平台可玩。</div>
        <div class="proj-footer">
          <div class="proj-arrow">
            Play now
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
          <a class="proj-gh" href="https://github.com/sorrowfeng/mahjong-go" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="View on GitHub">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
            </svg>
          </a>
        </div>
      </a>
    </div>
  </div>

  <script>
    /* ── Stars ── */
    (function () {
      const c = document.getElementById('stars');
      const ctx = c.getContext('2d');
      let W, H, pts = [];
      function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
      function Star() {
        this.x = Math.random() * W; this.y = Math.random() * H;
        this.r = Math.random() * 1.2 + 0.2;
        this.vx = (Math.random() - 0.5) * 0.15; this.vy = (Math.random() - 0.5) * 0.15;
        this.a = Math.random() * 0.6 + 0.1;
        this.flicker = Math.random() * Math.PI * 2;
        this.flickerSpeed = Math.random() * 0.02 + 0.005;
      }
      function init() { resize(); pts = Array.from({ length: 120 }, () => new Star()); }
      function tick() {
        ctx.clearRect(0, 0, W, H);
        pts.forEach(p => {
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
          if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
          p.flicker += p.flickerSpeed;
          const alpha = p.a * (0.7 + 0.3 * Math.sin(p.flicker));
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.fill();
        });
        requestAnimationFrame(tick);
      }
      window.addEventListener('resize', resize);
      init(); tick();
    })();

    /* ── Typewriter ── */
    (function () {
      const lines = ['Developer & Builder', 'Open Source Enthusiast', 'Always learning.'];
      const el = document.getElementById('typed');
      let li = 0, ci = 0, deleting = false, wait = 0;
      function step() {
        const cur = lines[li];
        if (!deleting) {
          el.textContent = cur.slice(0, ++ci);
          if (ci === cur.length) { deleting = true; wait = 60; }
        } else {
          if (wait-- > 0) { setTimeout(step, 16); return; }
          el.textContent = cur.slice(0, --ci);
          if (ci === 0) { deleting = false; li = (li + 1) % lines.length; wait = 0; }
        }
        setTimeout(step, deleting ? 38 : 72);
      }
      setTimeout(step, 900);
    })();

    /* ── Profile card parallax (desktop only) ── */
    (function () {
      const card = document.getElementById('profile-card');
      if (window.matchMedia('(hover: hover)').matches) {
        document.addEventListener('mousemove', e => {
          const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
          const dx = (e.clientX - cx) / cx, dy = (e.clientY - cy) / cy;
          card.style.transform = `perspective(800px) rotateY(${dx * 4}deg) rotateX(${-dy * 4}deg)`;
        });
        document.addEventListener('mouseleave', () => { card.style.transform = ''; });
      }
    })();
  </script>
</body>
</html>
